<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --color-primary: #670D0C;
  --color-primary-rgb: 103, 13, 12;
  --color-secondary: #A7A9AC;
  --color-accent: #C2A176;
  --color-accent-rgb: 194, 161, 118;
  --color-bg: #F8FAFC;
  --color-surface: #FFFFFF;
  --color-surface-raised: #FFFFFF;
  --color-surface-inset: #F1F5F9;
  --color-text-primary: #0F172A;
  --color-text-secondary: #334155;
  --color-text-tertiary: #64748B;
  --color-border: #E2E8F0;
  --color-border-strong: #CBD5E1;
  --color-success: #10B981;
  --color-warning: #F59E0B;
  --color-error: #EF4444;
  --color-primary-dim: rgba(103, 13, 12, 0.12);
  --color-secondary-dim: rgba(167, 169, 172, 0.12);

  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-full: 999px;

  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.20);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.20), 0 2px 4px -1px rgba(0,0,0,0.10);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.30), 0 4px 6px -2px rgba(0,0,0,0.20);

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  --font-heading: 'Cairo', sans-serif;
  --font-body: 'Cairo', sans-serif;
  --font-english: 'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-heading);
  background: var(--color-bg);
  color: var(--color-text-primary);
  overflow-x: hidden;
}
body.ltr { direction: ltr; font-family: var(--font-english); }
body.rtl { direction: rtl; }

.icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--radius-sm); border: none;
  font-weight: 600; font-size: 0.875rem; cursor: pointer; font-family: inherit;
  transition: all 0.15s ease;
}
.btn-primary {
  background: var(--color-primary); color: var(--color-bg);
}
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 0 0 3px var(--color-primary-dim); }
.btn-secondary {
  background: var(--color-surface-raised); color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}
.btn-secondary:hover { border-color: var(--color-border-strong); color: var(--color-text-primary); }

.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  transition: background 0.15s, border-color 0.15s;
}
.card:hover { background: var(--color-surface-raised); }

[contenteditable] { outline: none; cursor: text; }
[contenteditable]:focus { box-shadow: inset 0 0 0 2px var(--color-primary-dim); border-radius: var(--radius-sm); }

/* Outline Editor Specific */
.outline-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: 16px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: background 0.15s;
  position: relative;
  min-height: 68px;
}
.outline-card:first-child { border-radius: var(--radius-md) var(--radius-md) 0 0; }
.outline-card:last-child { border-radius: 0 0 var(--radius-md) var(--radius-md); }
.outline-card:only-child { border-radius: var(--radius-md); }
.outline-card + .outline-card { border-top: none; }
.outline-card:hover { background: var(--color-surface-raised); }
.outline-card.dragging { opacity: 0.6; background: var(--color-primary-dim); border: 1px dashed var(--color-primary); }
.outline-card.drag-over { border-top: 2px solid var(--color-primary) !important; }

.card-number {
  min-width: 28px; height: 28px; border-radius: var(--radius-sm);
  background: var(--color-primary-dim); color: var(--color-primary);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
}
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-size: 1rem; font-weight: 700; color: var(--color-text-primary);
  outline: none; width: 100%; line-height: 1.5;
}
.card-title:focus { color: var(--color-primary); }
.card-bullets {
  margin-top: 6px; font-size: 0.86rem; color: var(--color-text-secondary);
  line-height: 1.6; outline: none; min-height: 18px;
}
.card-bullets:empty::before { content: attr(data-placeholder); color: var(--color-text-tertiary); }

.card-actions {
  display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;
}
.card-action-btn {
  width: 28px; height: 28px; border: 1px solid var(--color-border);
  background: var(--color-surface-raised); color: var(--color-text-secondary);
  border-radius: var(--radius-sm); cursor: pointer; font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.card-action-btn:hover { background: var(--color-surface-inset); color: var(--color-text-primary); border-color: var(--color-border-strong); }
.card-action-btn.danger:hover { color: var(--color-error); background: rgba(239, 68, 68, 0.08); }

.drag-handle { cursor: grab; color: var(--color-text-tertiary); font-size: 1rem; user-select: none; flex-shrink: 0; margin-top: 6px; }

.add-card-btn {
  width: 100%; padding: 14px; border: 2px dashed var(--color-border);
  border-radius: var(--radius-md); background: transparent; color: var(--color-text-secondary);
  font-size: 0.92rem; font-weight: 600; cursor: pointer;
  font-family: inherit; margin-top: 12px;
}
.add-card-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-dim); }

.card-count-bar { padding: 8px 4px; font-size: 0.85rem; color: var(--color-text-secondary); }

.customize-title { font-size: 1.1rem; font-weight: 700; color: var(--color-text-primary); margin: 28px 0 14px; }
.customize-panel {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); padding: 20px; margin-bottom: 14px;
  box-shadow: var(--shadow-md);
}
.panel-header { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; color: var(--color-text-primary); }
.panel-sub { font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 14px; }

.density-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.density-option {
  border: 2px solid var(--color-border); border-radius: var(--radius-sm); padding: 12px 8px;
  text-align: center; cursor: pointer; background: var(--color-surface-raised);
}
.density-option.active { border-color: var(--color-primary); background: var(--color-primary-dim); }
.density-bar { height: 3px; background: var(--color-text-tertiary); border-radius: 2px; margin: 2px auto; }
.density-option.active .density-bar { background: var(--color-primary); }
.density-label { font-size: 0.8rem; font-weight: 600; color: var(--color-text-secondary); margin-top: 6px; }
.density-option.active .density-label { color: var(--color-primary); }

.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.theme-card {
  border: 2px solid var(--color-border); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer;
}
.theme-card.active { border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-dim); }
.theme-preview { padding: 14px; min-height: 72px; }
.theme-name {
  text-align: center; padding: 8px; font-size: 0.78rem; font-weight: 600;
  color: var(--color-text-secondary); background: var(--color-surface-raised); border-top: 1px solid var(--color-border);
}

.bottom-bar {
  position: sticky; bottom: 0;
  background: linear-gradient(to top, var(--color-bg) 85%, transparent);
  padding: 16px 0 8px; display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px; flex-wrap: wrap; gap: 12px;
}

/* Slide Editor Specific */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;background:var(--color-surface);border-bottom:1px solid var(--color-border);
  position:sticky;top:0;z-index:1000;
}
.top-bar-right{display:flex;align-items:center;gap:12px;}
.brand-icon{
  width:28px;height:28px;background:var(--color-primary);
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:0.85rem;color:var(--color-bg);
}
.top-btn{
  padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
  background:var(--color-surface-raised);color:var(--color-text-secondary);font-size:0.82rem;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.top-btn:hover{background:var(--color-surface-inset);color:var(--color-text-primary);}
.top-btn.primary{background:var(--color-primary);color:var(--color-bg);border:none;font-weight:600;}
.top-btn.primary:hover{filter:brightness(1.08);}
.save-hint{font-size:0.75rem;color:var(--color-success);margin-right:8px;opacity:0;transition:opacity 0.2s;}
.save-hint.show{opacity:1;}

.app-layout{display:flex;min-height:calc(100vh - 57px);}

.sidebar{
  width:100px;min-width:100px;background:var(--color-surface);border-left:1px solid var(--color-border);
  overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:6px;
}
body.ltr .sidebar{border-left:none;border-right:1px solid var(--color-border);}
.thumb{
  position:relative;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:all 0.15s;
  aspect-ratio:16/10;background:var(--color-surface-raised);
}
.thumb:hover{border-color:var(--color-border-strong);}
.thumb.active{border-color:var(--color-primary);}
.thumb-inner{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--color-text-secondary);}
.thumb-inner img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.thumb-number{position:absolute;top:3px;right:5px;font-size:0.6rem;color:var(--color-text-secondary);font-weight:700;z-index:2;background:var(--color-bg);padding:1px 4px;border-radius:3px;}

.main-content{
  flex:1;overflow-y:auto;padding:24px 32px;
  display:flex;flex-direction:column;gap:20px;align-items:center;
}

.slide-card{
  width:100%;max-width:960px;border-radius:var(--radius-md);overflow:hidden;
  background:var(--color-surface);border:1px solid var(--color-border);
  box-shadow:var(--shadow-md);
  transition:border-color 0.2s;
}
.slide-card:hover{border-color:var(--color-border-strong);}
.slide-card.active{border-color:var(--color-primary);box-shadow:0 0 0 2px var(--color-primary-dim);}

.slide-inner{display:flex;min-height:340px;direction:rtl;}
body.ltr .slide-inner{direction:ltr;}
.slide-inner.no-image .slide-text-col{max-width:100%;}

.slide-image-col{
  flex:0 0 42%;background:var(--color-surface-raised);position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border-left:1px solid var(--color-border);
}
body.ltr .slide-image-col{border-left:none;border-right:1px solid var(--color-border);}
.slide-image-col img{width:100%;height:100%;object-fit:cover;}

.slide-text-col{flex:1;padding:32px 36px;display:flex;flex-direction:column;justify-content:center;gap:12px;}
.slide-text-col h2{font-size:1.5rem;font-weight:700;line-height:1.35;color:var(--color-text-primary);margin:0;}
.slide-text-col .subtitle{font-size:0.95rem;color:var(--color-text-secondary);line-height:1.6;}
.slide-text-col .bullets{list-style:none;padding:0;margin:8px 0 0;}
.slide-text-col .bullets li{padding:4px 0;color:var(--color-text-secondary);font-size:0.92rem;line-height:1.6;position:relative;padding-right:16px;}
body.ltr .slide-text-col .bullets li{padding-right:0;padding-left:16px;}
.slide-text-col .bullets li::before{content:"\2022";position:absolute;right:0;color:var(--color-primary);font-weight:bold;}
body.ltr .slide-text-col .bullets li::before{right:auto;left:0;}
.slide-accent-bar{height:3px;width:40px;background:var(--color-primary);border-radius:2px;}

.slide-toolbar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px;border-top:1px solid var(--color-border);
}
.slide-tool-btn{
  padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--color-border);
  background:var(--color-surface-raised);color:var(--color-text-secondary);cursor:pointer;font-size:0.8rem;font-family:inherit;
  display:inline-flex;align-items:center;gap:4px;
}
.slide-tool-btn:hover{background:var(--color-surface-inset);color:var(--color-text-primary);border-color:var(--color-border-strong);}

/* Responsive */
@media (max-width: 768px) {
  .density-options { grid-template-columns: repeat(2, 1fr); }
  .theme-grid { grid-template-columns: repeat(2, 1fr); }
  .outline-card { padding: 12px; }
  .card-actions { flex-direction: row; }
  .slide-inner { flex-direction: column; }
  .slide-image-col { flex: none; height: 200px; }
  .sidebar { width: 80px; }
  .main-content { padding: 16px; }
}
@media (max-width: 480px) {
  .density-options { grid-template-columns: 1fr; }
  .bottom-bar { flex-direction: column; gap: 12px; align-items: stretch; }
  .top-bar { flex-wrap: wrap; }
  .slide-text-col { padding: 20px; }
  .slide-text-col h2 { font-size: 1.25rem; }
}

/* Cover slide preview styling - #CC460A right-to-left gradient over dark base */
.slide-inner.cover {
  background: linear-gradient(to left, rgba(204, 70, 10, 0.9), rgba(204, 70, 10, 0.0)), #0F0F12 !important;
}
.slide-inner.cover h2, 
.slide-inner.cover .subtitle, 
.slide-inner.cover .slide-text-col,
.slide-inner.cover li {
  color: #FFFFFF !important;
}


</style>
</head>

<script>
function sendToStreamlit(value) {
  window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setComponentValue", value }, "*");
}
function setFrameHeight(h) {
  window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h || document.body.scrollHeight + 40 }, "*");
}
function signalReady() {
  window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
}
function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}


const I18N = {'ar': {'outline': 'هيكل الشرائح', 'addCard': 'إضافة شريحة', 'cardsTotal': 'شريحة', 'cardBreaks': 'اكتب', 'cardBreaksCode': '---', 'cardBreaksEnd': 'لفصل الشرائح', 'customize': 'تخصيص العرض', 'textContent': 'كمية النص', 'textSub': 'مقدار المحتوى لكل شريحة', 'theme': 'السمة', 'themeSub': 'اختر سمة ألوان العرض', 'themeTitle': 'العنوان', 'themeBody': 'النص', 'back': 'رجوع', 'generate': 'توليد العرض', 'delete': 'حذف', 'moveUp': 'أعلى', 'moveDown': 'أسفل', 'bulletsPh': 'أضف نقاطاً أو وصفاً...', 'newSlide': 'شريحة جديدة', 'minimal': 'مختصر', 'concise': 'موجز', 'detailed': 'تفصيلي', 'extensive': 'شامل', 'requiresImage': 'توليد صورة لهذه الشريحة', 'imagePromptLabel': 'وصف الصورة المطلوب توليدها بالذكاء الاصطناعي (اختياري):', 'imagePromptPh': 'اكتب وصفاً تفصيلياً بالإنجليزية أو العربية لتوجيه الذكاء الاصطناعي...'}, 'en': {'outline': 'Slide outline', 'addCard': 'Add slide', 'cardsTotal': 'slides total', 'cardBreaks': 'Type', 'cardBreaksCode': '---', 'cardBreaksEnd': 'for slide breaks', 'customize': 'Customize your presentation', 'textContent': 'Text amount', 'textSub': 'Amount of text per slide', 'theme': 'Theme', 'themeSub': 'Choose a color theme for your deck', 'themeTitle': 'Title', 'themeBody': 'Body text', 'back': 'Back', 'generate': 'Generate presentation', 'delete': 'Delete', 'moveUp': 'Up', 'moveDown': 'Down', 'bulletsPh': 'Add talking points or description...', 'newSlide': 'New slide', 'minimal': 'Minimal', 'concise': 'Concise', 'detailed': 'Detailed', 'extensive': 'Extensive', 'requiresImage': 'Generate image for this slide', 'imagePromptLabel': 'AI Image prompt description (optional):', 'imagePromptPh': 'Describe the scene details in English or Arabic to guide the AI...'}};
const THEMES = [{'id': 'executive', 'name': 'Executive', 'bg': '#F8FAFC', 'title': '#0F172A', 'body': '#334155', 'accent': '#670D0C'}, {'id': 'corporate', 'name': 'Corporate', 'bg': '#FFFFFF', 'title': '#0F172A', 'body': '#334155', 'accent': '#A7A9AC'}, {'id': 'minimal', 'name': 'Minimal', 'bg': '#F1F5F9', 'title': '#0F172A', 'body': '#334155', 'accent': '#0F172A'}, {'id': 'warm', 'name': 'Warm', 'bg': '#1A1A1A', 'title': '#F1F5F9', 'body': '#94A3B8', 'accent': '#C9A87C'}];
const DENSITIES = [
  { id:"minimal",   labelKey:"minimal",   bars:[20] },
  { id:"concise",   labelKey:"concise",   bars:[28,22] },
  { id:"detailed",  labelKey:"detailed",  bars:[28,24,20] },
  { id:"extensive", labelKey:"extensive", bars:[28,26,24,20] }
];

let state = null;
let uiLang = "ar";
let dragSrcIdx = null;

function L(key) { return (I18N[uiLang] || I18N.ar)[key] || key; }

function applyLang() {
  document.body.className = uiLang === "en" ? "ltr" : "rtl";
  document.documentElement.lang = uiLang;
  document.documentElement.dir = uiLang === "en" ? "ltr" : "rtl";
}

function renderApp() {
  if (!state) return;
  applyLang();
  const app = document.getElementById("app");

  let html = `<div class="customize-title">${L("outline")}</div>`;
  html += `<div class="cards-container" id="cardsContainer">`;

  state.outline.forEach((card, i) => {
    const bullets = (card.bullets || "").replace(/\n/g, "<br>");
    html += `
      <div class="outline-card" draggable="true" data-idx="${i}"
           ondragstart="onDragStart(event,${i})" ondragover="onDragOver(event,${i})"
           ondragleave="onDragLeave(event)" ondrop="onDrop(event,${i})" ondragend="onDragEnd(event)">
        <span class="drag-handle" aria-hidden="true"><svg class="icon"><use href="#icon-grip-vertical"/></svg></span>
        <div class="card-number">${i+1}</div>
        <div class="card-body">
          <div class="card-title" contenteditable="true" role="textbox"
               onblur="onTitleEdit(${i}, this.innerText)">${escHtml(card.topic)}</div>
          <div class="card-bullets" contenteditable="true" role="textbox" data-placeholder="${L("bulletsPh")}"
               onblur="onBulletsEdit(${i}, this.innerText)">${bullets}</div>
               
          <div class="card-image-config" style="margin-top: 12px; border-top: 1px dashed var(--color-border); padding-top: 10px;">
            <label style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; cursor: pointer; color: var(--color-text-primary);">
              <input type="checkbox" onchange="toggleImage(${i}, this.checked)" ${card.requires_image ? 'checked' : ''} style="accent-color: var(--color-primary); cursor: pointer; width: 14px; height: 14px;">
              <span style="font-weight: 600;">${L("requiresImage")}</span>
            </label>
            <div id="image-prompt-wrapper-${i}" style="${card.requires_image ? 'display: block;' : 'display: none;'} margin-top: 8px;">
              <div style="font-size: 0.75rem; color: var(--color-text-secondary); margin-bottom: 4px;">${L("imagePromptLabel")}</div>
              <div class="image-prompt-input" contenteditable="true" role="textbox" data-placeholder="${L("imagePromptPh")}"
                   onblur="onImagePromptEdit(${i}, this.innerText)"
                   style="font-size: 0.85rem; background: var(--color-surface-raised); border: 1px solid var(--color-border); padding: 8px 10px; border-radius: 4px; color: var(--color-text-primary); outline: none; min-height: 40px; direction: ltr; text-align: left;">${escHtml(card.image_prompt || '')}</div>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <button type="button" class="card-action-btn" onclick="moveCard(${i},-1)" title="${L("moveUp")}" aria-label="${L("moveUp")}"><svg class="icon"><use href="#icon-arrow-up"/></svg></button>
          <button type="button" class="card-action-btn" onclick="moveCard(${i},1)" title="${L("moveDown")}" aria-label="${L("moveDown")}"><svg class="icon"><use href="#icon-arrow-down"/></svg></button>
          <button type="button" class="card-action-btn danger" onclick="deleteCard(${i})" title="${L("delete")}" aria-label="${L("delete")}"><svg class="icon"><use href="#icon-trash"/></svg></button>
        </div>
      </div>`;
  });

  html += `</div>`;
  html += `<button type="button" class="add-card-btn" onclick="addCard()"><svg class="icon"><use href="#icon-plus"/></svg> ${L("addCard")}</button>`;
  html += `<div class="card-count-bar" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <span>${state.outline.length} ${L("cardsTotal")}</span>
    <span>${L("cardBreaks")} <code style="background:var(--color-surface-raised);padding:2px 6px;border-radius:4px;">${L("cardBreaksCode")}</code> ${L("cardBreaksEnd")}</span>
  </div>`;

  html += `<div class="customize-title">${L("customize")}</div>`;
  html += `<div class="customize-panel"><div class="panel-header">${L("textContent")}</div><div class="panel-sub">${L("textSub")}</div><div class="density-options">`;
  DENSITIES.forEach(d => {
    const active = state.density === d.id ? "active" : "";
    const barsHtml = d.bars.map(w => `<div class="density-bar" style="width:${w}px"></div>`).join("");
    html += `<div class="density-option ${active}" onclick="setDensity('${d.id}')"><div>${barsHtml}</div><div class="density-label">${L(d.labelKey)}</div></div>`;
  });
  html += `</div></div>`;

  html += `<div class="customize-panel"><div class="panel-header">${L("theme")}</div><div class="panel-sub">${L("themeSub")}</div><div class="theme-grid">`;
  THEMES.forEach(t => {
    const active = state.theme === t.id ? "active" : "";
    html += `<div class="theme-card ${active}" onclick="setTheme('${t.id}')">
      <div class="theme-preview" style="background:${t.bg}">
        <div style="color:${t.title};font-weight:700;font-size:0.95rem;">${L("themeTitle")}</div>
        <div style="color:${t.body};font-size:0.75rem;">${L("themeBody")}</div>
      </div><div class="theme-name">${t.name}</div></div>`;
  });
  html += `</div></div>`;

  html += `<div class="bottom-bar">
    <span class="card-count-bar">${state.outline.length} ${L("cardsTotal")}</span>
    <div style="display:flex;gap:12px;">
      <button type="button" class="btn btn-secondary" onclick="goBack()">${L("back")}</button>
      <button type="button" class="btn btn-primary" onclick="doGenerate()"><svg class="icon"><use href="#icon-wand"/></svg> ${L("generate")}</button>
    </div>
  </div>`;

  app.innerHTML = html;
  setTimeout(() => setFrameHeight(), 50);
}

function onTitleEdit(idx, text) { state.outline[idx].topic = text.trim(); }
function onBulletsEdit(idx, text) { state.outline[idx].bullets = text.trim(); }

function toggleImage(idx, checked) { 
  state.outline[idx].requires_image = checked;
  const wrapper = document.getElementById(`image-prompt-wrapper-${idx}`);
  if (wrapper) wrapper.style.display = checked ? 'block' : 'none';
}
function onImagePromptEdit(idx, text) { state.outline[idx].image_prompt = text.trim(); }

function deleteCard(idx) {
  if (state.outline.length <= 1) return;
  state.outline.splice(idx, 1);
  renderApp();
}
function addCard() {
  state.outline.push({ topic: L("newSlide"), slide_type: "standard", requires_image: false, bullets: "" });
  renderApp();
}
function moveCard(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= state.outline.length) return;
  const item = state.outline.splice(idx, 1)[0];
  state.outline.splice(target, 0, item);
  renderApp();
}

function onDragStart(e, idx) { dragSrcIdx = idx; e.currentTarget.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; }
function onDragOver(e, idx) {
  e.preventDefault();
  if (idx !== dragSrcIdx) {
    document.querySelectorAll(".outline-card").forEach(c => c.classList.remove("drag-over"));
    e.currentTarget.classList.add("drag-over");
  }
}
function onDragLeave(e) { e.currentTarget.classList.remove("drag-over"); }
function onDrop(e, targetIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  const item = state.outline.splice(dragSrcIdx, 1)[0];
  state.outline.splice(targetIdx, 0, item);
  dragSrcIdx = null;
  renderApp();
}
function onDragEnd() {
  dragSrcIdx = null;
  document.querySelectorAll(".outline-card").forEach(c => {
    c.classList.remove("dragging");
    c.classList.remove("drag-over");
  });
}

function setDensity(id) { state.density = id; renderApp(); }
function setTheme(id) { state.theme = id; renderApp(); }

function goBack() { sendToStreamlit({ action: "back" }); }
function doGenerate() {
  const densityMap = {
    minimal: "Minimal (نقاط مختصرة جداً)",
    concise: "Concise (موجز ومباشر)",
    detailed: "Detailed (تفصيلي)",
    extensive: "Extensive (شامل ومطول)"
  };
  const themeObj = THEMES.find(t => t.id === state.theme) || THEMES[0];
  sendToStreamlit({
    action: "generate",
    outline: state.outline,
    density: densityMap[state.density] || state.density,
    theme: {
      id: themeObj.id, name: themeObj.name, font: "Cairo",
      bg_color: themeObj.bg, text_color: themeObj.title,
      body_color: themeObj.body, accent_color: themeObj.accent
    }
  });
}

window.addEventListener("message", (event) => {
  if (event.data.type === "streamlit:render") {
    const args = event.data.args;
    if (!state) {
      uiLang = args.lang || "ar";
      state = {
        outline: JSON.parse(JSON.stringify(args.outline || [])),
        density: args.initial_density || "concise",
        theme: args.initial_theme || "nebula"
      };
    }
    renderApp();
  }
});

signalReady();
</script>
</body>
</html>
